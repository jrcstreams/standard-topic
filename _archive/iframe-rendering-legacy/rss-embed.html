<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Top padding so the first article isn't kissing the parent's
     sticky title separator when the feed first loads. Bottom padding
     gives the last article some breathing room as the user scrolls
     all the way down. overflow-x clipped on both html + body so
     the rss.app widget can never introduce a horizontal scrollbar
     inside the iframe (regression: cards were briefly scrollable
     sideways on wider viewports). */
  html { overflow: hidden; overflow-x: hidden; }
  body {
    overflow: hidden;
    overflow-x: hidden;
    background: transparent;
    /* No horizontal padding inside the iframe — cards fill the
       iframe edge to edge so the iframe edge can be aligned 1:1
       with the parent column's content edges (no compensating
       pull-out needed on the host page). */
    padding: 0 0 1rem;
    max-width: 100%;
  }
  rssapp-wall { display: block; width: 100% !important; max-width: 100%; }
</style>
</head>
<body>
<script src="https://widget.rss.app/v1/wall.js" async></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const feedId = params.get('id');
  if (feedId) {
    const el = document.createElement('rssapp-wall');
    el.id = feedId;
    document.body.appendChild(el);
  }

  // Report body height to parent on every change
  let lastHeight = 0;
  function reportHeight() {
    const h = document.body.scrollHeight;
    if (h !== lastHeight && h > 0) {
      lastHeight = h;
      window.parent.postMessage({ rssHeight: h }, '*');
    }
  }

  new MutationObserver(reportHeight).observe(document.body, {
    childList: true, subtree: true, attributes: true
  });
  new ResizeObserver(reportHeight).observe(document.body);
  setInterval(reportHeight, 1000);

  // Forward wheel events to the parent. Browsers don't bubble wheel
  // across the iframe boundary, so without this the body padding /
  // grid inset region around the article cards becomes a dead zone
  // for scrolling the feed.
  window.addEventListener('wheel', (e) => {
    if (e.deltaY === 0 && e.deltaX === 0) return;
    window.parent.postMessage({
      rssWheel: { deltaY: e.deltaY, deltaX: e.deltaX, deltaMode: e.deltaMode },
    }, '*');
  }, { passive: true });
</script>
</body>
</html>
